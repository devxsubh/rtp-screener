# Production compose — runs on EC2.
# All external services (MongoDB Atlas, Upstash Redis, Resend, Cloudflare R2,
# OpenAI embeddings) are configured via .env.production.
# Only Watchman runs locally alongside the backend.
#
# Local dev (Watchman only, no .env.production):
#   docker compose -f docker-compose.dev.yml up
#
# Production on EC2:
#   cp .env.example .env.production   # fill in all secrets
#   docker compose --env-file .env.production up -d --build

services:

  # ── Watchman (sanctions data) ──────────────────────────────────────────────
  # Loads OFAC SDN + EU lists on startup (~30–60 s). Internal only — not
  # exposed outside the Docker network.
  watchman:
    image: moov/watchman:static
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      # /ping works on current moov/watchman:static; /v2/search returns 404 on v0.31+.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8084/ping"]
      interval: 20s
      timeout: 10s
      start_period: 90s   # SDN list load can take up to 60 s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - path: .env.production
        required: true   # must exist on EC2; create from .env.example
    environment:
      NODE_ENV: production
      # Point Watchman at the internal service, not localhost.
      WATCHMAN_URL: http://watchman:8084
      # EC2 sits behind 1 proxy hop (ALB / nginx reverse proxy).
      TRUST_PROXY_HOPS: "1"
    depends_on:
      watchman:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3001/health',r=>r.statusCode===200?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  internal:
    driver: bridge
